<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chinese Book 1 — Review</title>
<style>
  /* ---------- Theme tokens (light default, dark via prefers-color-scheme) ---------- */
  :root {
    --bg: #f4f5f7; --card: #ffffff; --card-border: #e2e5ea;
    --text: #1b1d22; --muted: #6b7280; --accent: #5a9ba3; --accent-text: #ffffff;
    --opt-bg: #ffffff; --opt-border: #d4d8df; --opt-hover: #eef6f7;
    --correct-bg: #e6f6ea; --correct-border: #3ca35a; --correct-text: #1d6b34;
    --wrong-bg: #fdeaea; --wrong-border: #d9534f; --wrong-text: #a3302c;
    --shadow: 0 6px 24px rgba(0,0,0,0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a; --card: #1e2127; --card-border: #2c3038;
      --text: #f0f2f5; --muted: #9aa1ad; --accent: #5fb0ba; --accent-text: #0c1112;
      --opt-bg: #23272e; --opt-border: #353a43; --opt-hover: #2b313a;
      --correct-bg: #14331f; --correct-border: #3ca35a; --correct-text: #7ee29a;
      --wrong-bg: #361a1a; --wrong-border: #d9534f; --wrong-text: #f0a3a0;
      --shadow: 0 6px 24px rgba(0,0,0,0.4);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; -webkit-text-size-adjust: 100%;
  }
  /* Natural document flow: the page scrolls when a question is taller than the
     screen, so the Next button can always be scrolled fully into view above the
     browser's bottom toolbar. (A fixed/clipped full-height layout pinned Next to
     the bottom, where the toolbar covered it.) Compact sizing keeps most
     questions on a single screen; the progress bar stays pinned at the top. */
  .wrap {
    max-width: 680px; margin: 0 auto;
    padding: 8px 14px calc(20px + env(safe-area-inset-bottom, 0px));
    min-height: 100svh;
  }

  header { text-align: center; margin: 2px 0 8px; }
  header h1 { font-size: 1.05rem; margin: 0 0 2px; font-weight: 700; }
  header .sub { color: var(--muted); font-size: 0.78rem; }

  /* ---------- Tabs ---------- */
  .tabs { display: flex; gap: 8px; margin-bottom: 10px; }
  .tab {
    flex: 1 1 0; padding: 10px 8px; border: 1.5px solid var(--opt-border);
    background: var(--opt-bg); color: var(--muted); border-radius: 12px;
    font: inherit; font-weight: 700; cursor: pointer; line-height: 1.2;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }

  /* ---------- Toolbar ---------- */
  .toolbar { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 8px; }
  .toolbar button { flex: 0 0 auto; padding: 8px 11px; font-size: 0.92rem; }
  #btn-flip {
    background: var(--accent); border-color: var(--accent); color: var(--accent-text);
    font-weight: 700; letter-spacing: 0.01em;
  }
  #btn-flip:hover { filter: brightness(1.06); background: var(--accent); }
  #btn-flip .swap { opacity: 0.85; font-weight: 400; }
  #btn-pinyin.off { opacity: 0.7; }

  /* ---------- Share / QR panel ---------- */
  #share-panel { margin: 0 0 12px; }
  .share-card {
    background: var(--card); border: 1px solid var(--card-border); border-radius: 16px;
    box-shadow: var(--shadow); padding: 18px; text-align: center;
  }
  .share-title { font-weight: 700; margin-bottom: 12px; }
  .qr { width: 220px; max-width: 70vw; height: auto; image-rendering: pixelated; background: #fff; padding: 8px; border-radius: 8px; }
  .share-link { display: block; margin: 12px 0; color: var(--accent); font-weight: 600; word-break: break-all; text-decoration: none; }
  .share-link:hover { text-decoration: underline; }

  /* ---------- Progress bar ---------- */
  .progress-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    font-size: 0.85rem; color: var(--muted);
    position: sticky; top: 0; z-index: 5; background: var(--bg); padding: 6px 0;
  }
  .progress-track { flex: 1; height: 8px; background: var(--card-border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 99px; transition: width 0.25s ease; }
  .mode-tag { font-weight: 600; color: var(--accent); white-space: nowrap; }

  /* ---------- Prompt / cards ---------- */
  .card {
    background: var(--card); border: 1px solid var(--card-border); border-radius: 16px;
    box-shadow: var(--shadow); padding: 13px 14px; text-align: center; margin-bottom: 10px;
  }
  .prompt-cn { font-size: 3.1rem; line-height: 1.1; font-weight: 600; letter-spacing: 0.02em; margin: 2px 0 4px; word-break: break-word; }
  .prompt-py { font-size: 1.25rem; color: var(--muted); margin-bottom: 2px; }
  .prompt-en { font-size: 2rem; font-weight: 600; margin: 4px 0; word-break: break-word; }
  .prompt-pos {
    display: inline-block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); border: 1px solid var(--card-border); border-radius: 99px; padding: 2px 10px; margin-top: 6px;
  }

  /* ---------- Options ---------- */
  .options { display: grid; gap: 7px; }
  .opt {
    width: 100%; text-align: left; background: var(--opt-bg); border: 1.5px solid var(--opt-border);
    color: var(--text); border-radius: 12px; padding: 10px 14px; cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease, transform 0.05s ease;
    display: flex; align-items: center; gap: 12px;
  }
  .opt:hover:not(:disabled) { background: var(--opt-hover); }
  .opt:active:not(:disabled) { transform: scale(0.99); }
  .opt:disabled { cursor: default; }
  .opt .num { flex: 0 0 auto; width: 26px; height: 26px; border-radius: 50%; background: var(--card-border); color: var(--text); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; }
  .opt .label-en { font-size: 1.15rem; font-weight: 500; }
  .opt .label-cn { font-size: 1.85rem; font-weight: 600; line-height: 1.1; }
  .opt.correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct-text); }
  .opt.correct .num { background: var(--correct-border); color: #fff; }
  .opt.wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: var(--wrong-text); }
  .opt.wrong .num { background: var(--wrong-border); color: #fff; }

  /* ---------- Buttons ---------- */
  button.btn { font: inherit; font-weight: 600; border-radius: 12px; padding: 10px 14px; border: 1.5px solid var(--opt-border); background: var(--opt-bg); color: var(--text); cursor: pointer; transition: background 0.12s ease, transform 0.05s ease; }
  button.btn:hover { background: var(--opt-hover); }
  button.btn:active { transform: scale(0.98); }
  button.btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }
  button.btn.primary:hover { filter: brightness(1.06); background: var(--accent); }

  .next-row { margin-top: 8px; text-align: center; padding: 6px 0 2px; }
  #btn-next { width: 100%; max-width: 340px; padding: 13px 16px; font-size: 1.05rem; }
  .feedback { text-align: center; font-weight: 600; min-height: 1.3em; margin-top: 8px; }
  .feedback.ok { color: var(--correct-text); }
  .feedback.no { color: var(--wrong-text); }

  /* ---------- Results ---------- */
  .results { text-align: center; }
  .score-big { font-size: 3.4rem; font-weight: 800; margin: 6px 0; }
  .score-sub { color: var(--muted); margin-bottom: 8px; }
  .results-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0 8px; }
  .missed-list { text-align: left; margin: 18px auto 0; border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; }
  .missed-list .head { background: var(--opt-hover); padding: 10px 16px; font-weight: 700; font-size: 0.9rem; }
  .missed-row { display: grid; grid-template-columns: auto 1fr; gap: 4px 14px; padding: 12px 16px; border-top: 1px solid var(--card-border); align-items: baseline; }
  .missed-row .mc-cn { font-size: 2rem; font-weight: 600; line-height: 1.15; }
  .missed-row .mc-meta { color: var(--muted); }
  .missed-row .mc-meta .py { color: var(--accent); font-weight: 600; }
  .missed-row .mc-meta .en { color: var(--text); }
  .perfect { font-size: 1.1rem; color: var(--correct-text); font-weight: 700; margin-top: 14px; }
  .clean-badge { color: var(--correct-text); font-weight: 700; }

  /* ---------- Flashcards (Whole-Book Review) ---------- */
  .fc-card { min-height: 160px; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .fc-side-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .fc-cn { font-size: 3.6rem; line-height: 1.1; font-weight: 600; word-break: break-word; }
  .fc-en { font-size: 2.1rem; font-weight: 600; word-break: break-word; }
  .fc-py, .fc-py-rev { font-size: 1.3rem; color: var(--accent); font-weight: 600; }
  .fc-pos { font-size: 0.78rem; color: var(--muted); }
  /* Sentence-sized text for the Whole-Book Review deck */
  .fc-cn-s { font-size: 2.2rem; line-height: 1.45; font-weight: 600; word-break: break-word; }
  .fc-en-s { font-size: 1.55rem; line-height: 1.4; font-weight: 600; word-break: break-word; }
  .fc-lesson { font-size: 0.72rem; color: var(--accent); font-weight: 700; letter-spacing: 0.05em; margin-bottom: 4px; }
  .fc-divider { border: none; border-top: 1px dashed var(--card-border); margin: 8px auto; width: 80%; }
  .fc-controls { text-align: center; }
  .fc-grade { display: flex; gap: 10px; justify-content: center; }
  .fc-grade .btn { flex: 1 1 0; max-width: 200px; padding: 13px; font-size: 1.02rem; }
  #fc-show { width: 100%; max-width: 340px; padding: 13px 16px; font-size: 1.05rem; }
  .btn.good { background: var(--correct-border); border-color: var(--correct-border); color: #fff; }
  .btn.again { background: transparent; }

  .note { color: var(--muted); font-size: 0.82rem; text-align: center; margin: 10px 0; padding: 10px; border: 1px dashed var(--card-border); border-radius: 12px; }
  .hint { color: var(--muted); font-size: 0.72rem; margin-top: 14px; text-align: center; }

  /* Pinyin toggle hides pinyin only on the QUESTION side (prompt + flashcard front).
     Answer reveals always show pinyin: feedback (.fb-py), flashcard back (.fc-py-rev),
     and the missed-words review. */
  body.hide-pinyin .prompt-py,
  body.hide-pinyin .fc-py { display: none !important; }

  @media (max-height: 720px) {
    .prompt-cn, .fc-cn { font-size: 2.7rem; }
    .prompt-en, .fc-en { font-size: 1.7rem; }
    .fc-cn-s { font-size: 1.8rem; }
    .fc-en-s { font-size: 1.3rem; }
    .prompt-py, .fc-py, .fc-py-rev { font-size: 1.1rem; }
    .card { padding: 12px 14px; margin-bottom: 10px; }
    .opt { padding: 9px 12px; }
    .opt .label-cn { font-size: 1.6rem; }
    .opt .label-en { font-size: 1.05rem; }
    .hint { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Chinese Book 1 — Review</h1>

  <!-- Tabs -->

  <!-- ================= TAB 1: VOCABULARY REVIEW (multiple choice) ================= -->
  <section id="tab-vocab">

/* ============================================================
   Shared state
   ============================================================ */
const QUIZ_URL = "https://ansaaj1990.github.io/chinese-book1-quiz/";
let direction = "cn2en";   // "cn2en" or "en2cn" — shared by both tabs
let showPinyin = true;
let currentTab = "vocab";

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function escapeHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function answerKey(word) { return direction === "cn2en" ? word.en : word.cn; }

/* ============================================================
   TAB 1 — Multiple-choice vocabulary quiz
   ============================================================ */
let queue = [], roundWords = [], missedThisRound = [], totalAnswered = 0, correctCount = 0, isDrill = false, answered = false;

function buildOptions(correct) {
  const correctKey = answerKey(correct);
  const pool = VOCAB.filter(w => answerKey(w) !== correctKey);
  const samePos = shuffle(pool.filter(w => w.pos === correct.pos));
  const otherPos = shuffle(pool.filter(w => w.pos !== correct.pos));
  const ordered = samePos.concat(otherPos);
  const distractors = [];
  const usedKeys = new Set([correctKey]);
  for (const w of ordered) {
    const k = answerKey(w);
    if (usedKeys.has(k)) continue;
    usedKeys.add(k);
    distractors.push(w);
    if (distractors.length === 3) break;
  }
  return shuffle([correct].concat(distractors));
}

function startRound(words, drill) {
  isDrill = drill;
  roundWords = words.slice();
  queue = shuffle(words);
  missedThisRound = [];
  totalAnswered = 0;
  correctCount = 0;
  document.getElementById("results-screen").style.display = "none";
  document.getElementById("quiz-screen").style.display = "block";
  nextQuestion();
}

function nextQuestion() {
  answered = false;
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").className = "feedback";
  document.getElementById("next-row").style.display = "none";
  if (queue.length === 0) { showResults(); return; }
  renderPrompt(queue[0]);
  renderOptions(queue[0]);
  renderProgress();
}

function renderProgress() {
  const total = roundWords.length;
  const pct = total === 0 ? 0 : Math.round((totalAnswered / total) * 100);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text").textContent = totalAnswered + " / " + total;
  document.getElementById("mode-tag").textContent = isDrill ? "Drill" : "Quiz";
}

function renderPrompt(word) {
  const card = document.getElementById("prompt-card");
  if (direction === "cn2en") {
    card.innerHTML =
      '<div class="prompt-cn">' + escapeHtml(word.cn) + '</div>' +
      '<div class="prompt-py">' + escapeHtml(word.py) + '</div>' +
      '<div class="prompt-pos">' + escapeHtml(word.pos) + '</div>';
  } else {
    card.innerHTML =
      '<div class="prompt-en">' + escapeHtml(word.en) + '</div>' +
      '<div class="prompt-pos">' + escapeHtml(word.pos) + '</div>';
  }
}

function renderOptions(word) {
  const opts = buildOptions(word);
  const box = document.getElementById("options");
  box.innerHTML = "";
  opts.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.type = "button";
    if (answerKey(opt) === answerKey(word)) btn.dataset.correct = "1";
    const num = '<span class="num">' + (i + 1) + '</span>';
    if (direction === "cn2en") {
      btn.innerHTML = num + '<span class="label-en">' + escapeHtml(opt.en) + '</span>';
    } else {
      // English → Chinese: characters only (no pinyin) so it tests recognition.
      btn.innerHTML = num + '<span class="label-cn">' + escapeHtml(opt.cn) + '</span>';
    }
    btn.addEventListener("click", () => handleAnswer(btn, opt, word));
    box.appendChild(btn);
  });
}

function handleAnswer(btn, chosen, correct) {
  if (answered) return;
  answered = true;
  totalAnswered++;
  const buttons = Array.from(document.getElementById("options").children);
  buttons.forEach(b => b.disabled = true);
  const isRight = answerKey(chosen) === answerKey(correct);
  const fb = document.getElementById("feedback");
  if (isRight) {
    btn.classList.add("correct");
    correctCount++;
    // Always reveal the word's pinyin on a correct answer, even if pinyin is toggled off.
    fb.innerHTML = "Correct ✓ &nbsp; <strong>" + escapeHtml(correct.cn) + "</strong> · " +
      escapeHtml(correct.py);
    fb.className = "feedback ok";
  } else {
    btn.classList.add("wrong");
    buttons.forEach(b => { if (b.dataset.correct === "1") b.classList.add("correct"); });
    fb.innerHTML = "Answer: <strong>" +
      (direction === "cn2en"
        ? escapeHtml(correct.en)
        : escapeHtml(correct.cn) + ' <span class="fb-py">(' + escapeHtml(correct.py) + ")</span>") +
      "</strong>";
    fb.className = "feedback no";
    recordMiss(correct);
  }
  document.getElementById("next-row").style.display = "block";
  renderProgress();
}

function recordMiss(word) { missedThisRound.push(word); }

function uniqueMissedThisRound() {
  const seen = new Set(), out = [];
  for (const w of missedThisRound) {
    const k = w.cn + "|" + w.en;
    if (!seen.has(k)) { seen.add(k); out.push(w); }
  }
  return out;
}

function showResults() {
  document.getElementById("quiz-screen").style.display = "none";
  document.getElementById("results-screen").style.display = "block";
  const total = roundWords.length;
  const pct = total === 0 ? 100 : Math.round((correctCount / total) * 100);
  document.getElementById("score-big").textContent = pct + "%";
  document.getElementById("score-sub").textContent =
    correctCount + " of " + total + " correct" + (isDrill ? " (drill round)" : "");
  const actions = document.getElementById("results-actions");
  actions.innerHTML = "";
  const missedContainer = document.getElementById("missed-container");
  missedContainer.innerHTML = "";
  if (missedThisRound.length === 0) {
    const msg = document.createElement("div");
    msg.className = "perfect";
    msg.innerHTML = isDrill
      ? '<span class="clean-badge">✓ Clean round — all drilled words mastered!</span>'
      : '<span class="clean-badge">✓ Perfect — no mistakes!</span>';
    missedContainer.appendChild(msg);
    actions.appendChild(mkBtn("Restart all words", "primary", () => startRound(VOCAB, false)));
  } else {
    const miss = uniqueMissedThisRound();
    actions.appendChild(mkBtn("Drill these words (" + miss.length + ")", "primary", () => startRound(miss, true)));
    actions.appendChild(mkBtn("Restart all words", "", () => startRound(VOCAB, false)));
    renderMissedList(missedContainer, miss);
  }
}

function renderMissedList(container, words) {
  const list = document.createElement("div");
  list.className = "missed-list";
  const head = document.createElement("div");
  head.className = "head";
  head.textContent = "Missed this round (" + words.length + ")";
  list.appendChild(head);
  words.forEach(w => {
    const row = document.createElement("div");
    row.className = "missed-row";
    row.innerHTML =
      '<div class="mc-cn">' + escapeHtml(w.cn) + '</div>' +
      '<div class="mc-meta"><span class="py fb-py">' + escapeHtml(w.py) + '</span><span class="fb-py"> — </span>' +
      '<span class="en">' + escapeHtml(w.en) + '</span></div>';
    list.appendChild(row);
  });
  container.appendChild(list);
}

function mkBtn(label, cls, onClick) {
  const b = document.createElement("button");
  b.className = "btn" + (cls ? " " + cls : "");
  b.textContent = label;
  b.addEventListener("click", onClick);
  return b;
}

/* ============================================================
   TAB 2 — Flashcard self-test (Whole-Book Review)
   ============================================================ */
let fcDeck = [], fcNext = [], fcIndex = 0, fcMastered = 0, fcTotal = 0, fcRevealed = false;

function fcStart() {
  fcDeck = shuffle(BOOK_SENTENCES);
  fcNext = [];
  fcIndex = 0;
  fcMastered = 0;
  fcTotal = BOOK_SENTENCES.length;
  document.getElementById("fc-done").style.display = "none";
  document.getElementById("fc-screen").style.display = "block";
  fcRender();
}

function fcRender() {
  fcRevealed = false;
  document.getElementById("fc-grade").style.display = "none";
  document.getElementById("fc-show").style.display = "block";

  if (fcIndex >= fcDeck.length) {
    if (fcNext.length > 0) { fcDeck = fcNext; fcNext = []; fcIndex = 0; }
    else { fcFinish(); return; }
  }
  const s = fcDeck[fcIndex];
  const tag = '<div class="fc-lesson">Lesson ' + s.lesson + '</div>';
  let front;
  if (direction === "cn2en") {
    front = tag + '<div class="fc-side-label">Read the Chinese — recall the meaning</div>' +
      '<div class="fc-cn-s">' + escapeHtml(s.cn) + '</div>' +
      '<div class="fc-py">' + escapeHtml(s.py) + '</div>';
  } else {
    front = tag + '<div class="fc-side-label">Say this in Chinese</div>' +
      '<div class="fc-en-s">' + escapeHtml(s.en) + '</div>';
  }
  document.getElementById("fc-card").innerHTML = front;
  fcProgress();
}

function fcReveal() {
  if (fcRevealed) return;
  fcRevealed = true;
  const s = fcDeck[fcIndex];
  let back;
  if (direction === "cn2en") {
    // Reveal meaning + pinyin (always shown, so the reading is confirmed even if pinyin is off).
    back = '<div class="fc-side-label">Meaning</div>' +
           '<div class="fc-en-s">' + escapeHtml(s.en) + '</div>' +
           '<div class="fc-py-rev">' + escapeHtml(s.py) + '</div>';
  } else {
    back = '<div class="fc-side-label">Chinese</div>' +
           '<div class="fc-cn-s">' + escapeHtml(s.cn) + '</div>' +
           '<div class="fc-py-rev">' + escapeHtml(s.py) + '</div>';
  }
  document.getElementById("fc-card").innerHTML += '<hr class="fc-divider">' + back;
  document.getElementById("fc-show").style.display = "none";
  document.getElementById("fc-grade").style.display = "flex";
}

function fcGrade(got) {
  if (!fcRevealed) return;
  if (got) fcMastered++;
  else fcNext.push(fcDeck[fcIndex]);   // re-queue for another pass
  fcIndex++;
  fcRender();
}

function fcProgress() {
  const pct = fcTotal === 0 ? 0 : Math.round((fcMastered / fcTotal) * 100);
  document.getElementById("fc-fill").style.width = pct + "%";
  document.getElementById("fc-progress").textContent = "Mastered " + fcMastered + " / " + fcTotal;
}

function fcFinish() {
  document.getElementById("fc-screen").style.display = "none";
  document.getElementById("fc-done").style.display = "block";
}

/* ============================================================
   UI plumbing — tabs, pinyin, flip, share
   ============================================================ */
function showTab(name) {
  currentTab = name;
  const isVocab = name === "vocab";
  document.getElementById("tab-vocab").style.display = isVocab ? "block" : "none";
  document.getElementById("tab-book").style.display = isVocab ? "none" : "block";
  document.getElementById("tab-btn-vocab").classList.toggle("active", isVocab);
  document.getElementById("tab-btn-book").classList.toggle("active", !isVocab);
}

function updateFlipLabel() {
  const b = document.getElementById("btn-flip");
  b.innerHTML = (direction === "cn2en" ? "中文 &rarr; English" : "English &rarr; 中文") + ' <span class="swap">⇄</span>';
}

function updatePinyinLabel() {
  const b = document.getElementById("btn-pinyin");
  b.textContent = showPinyin ? "Pinyin: On" : "Pinyin: Off";
  b.classList.toggle("off", !showPinyin);
  document.body.classList.toggle("hide-pinyin", !showPinyin);
}

// Tabs
document.getElementById("tab-btn-vocab").addEventListener("click", () => showTab("vocab"));
document.getElementById("tab-btn-book").addEventListener("click", () => showTab("book"));

// Direction (shared) — restart the active tab so prompts switch
document.getElementById("btn-flip").addEventListener("click", () => {
  direction = direction === "cn2en" ? "en2cn" : "cn2en";
  updateFlipLabel();
  if (currentTab === "vocab") startRound(VOCAB, false); else fcStart();
});

// Pinyin show/hide (global, instant via body class — no reset)
document.getElementById("btn-pinyin").addEventListener("click", () => {
  showPinyin = !showPinyin;
  updatePinyinLabel();
});

// Share / QR
document.getElementById("btn-share").addEventListener("click", () => {
  const p = document.getElementById("share-panel");
  p.style.display = p.style.display === "none" ? "block" : "none";
});
document.getElementById("btn-copy").addEventListener("click", async () => {
  const btn = document.getElementById("btn-copy");
  let ok = false;
  try { await navigator.clipboard.writeText(QUIZ_URL); ok = true; }
  catch (e) {
    const ta = document.createElement("textarea");
    ta.value = QUIZ_URL; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { ok = document.execCommand("copy"); } catch (_) { ok = false; }
    document.body.removeChild(ta);
  }
  btn.textContent = ok ? "Copied!" : "Copy failed — long-press the link";
  setTimeout(() => { btn.textContent = "Copy link"; }, 1800);
});

// Restart (tab-aware): restarts whichever tab is active
document.getElementById("btn-restart").addEventListener("click", () => {
  if (currentTab === "vocab") startRound(VOCAB, false); else fcStart();
});
document.getElementById("btn-next").addEventListener("click", () => { queue.shift(); nextQuestion(); });

// Flashcard controls
document.getElementById("fc-show").addEventListener("click", fcReveal);
document.getElementById("fc-got").addEventListener("click", () => fcGrade(true));
document.getElementById("fc-again").addEventListener("click", () => fcGrade(false));
document.getElementById("fc-again-all").addEventListener("click", fcStart);

// Keyboard
document.addEventListener("keydown", (e) => {
  if (currentTab === "vocab") {
    if (document.getElementById("quiz-screen").style.display === "none") return;
    if (!answered && ["1","2","3","4"].includes(e.key)) {
      const b = document.getElementById("options").children[parseInt(e.key,10)-1];
      if (b) b.click();
    } else if (answered && (e.key === "Enter" || e.key === "ArrowRight")) {
      document.getElementById("btn-next").click();
    }
  } else {
    if (document.getElementById("fc-screen").style.display === "none") return;
    if (!fcRevealed && (e.key === " " || e.key === "Enter")) { e.preventDefault(); fcReveal(); }
    else if (fcRevealed && (e.key === "1" || e.key.toLowerCase() === "a")) fcGrade(false);
    else if (fcRevealed && (e.key === "2" || e.key.toLowerCase() === "g" || e.key === "Enter")) fcGrade(true);
  }
});

// ---- Boot ----
updateFlipLabel();
updatePinyinLabel();
showTab("vocab");
startRound(VOCAB, false);
fcStart();
</script>
